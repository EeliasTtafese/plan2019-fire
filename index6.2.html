<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>መተግበሪያ ለመፍትሔ</title>
    <link rel="icon" href="img/App4SolnLogo.jpg" type="image/gif/png">
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>ግብ5~ ዘመናዊ ቴክኖሎጂ በማቅረብና በመዘርጋት የኮሚሽኑን አገልግሎቶች ተደራሽነትን ማረጋገጥ</h1>
            <p class="subtitle">ቴክኖሎጂ በማቅረብና በመዘርጋት</p>
        </header>

        <!-- Macro Progress Component -->
        <div class="overall-card">
            <div class="overall-header">
                <span><a href="index6.html">ዓላማ5.2~ በኮሚሽኑ ስራ ላይ ያሉ ቴክኖሎጂ 100% ማስተዳደር</a></span>
                <span id="macroPercent">0%</span>
            </div>
            <div class="progress-track">
                <div id="macroBar" class="progress-fill bg-green"></div>
            </div>
        </div>

        <!-- Roadmap Items Loop -->
        <div class="roadmap-list">
            
            <!-- Phase 1 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">ተግባር5.2.1~ የሲስተም ብልሽት 100% መጠገን</span>
                    <div class="controls">
                        <label for="p1">ክንውን</label>
                        <input type="number" id="p1" class="progress-input" min="0" max="100" value="00">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p1Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 2 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">ተግባር5.2.2~ በሲስተም አጠቃቀም የአሰልጣኞች ስልጠና 100% መስጠት</span>
                    <div class="controls">
                        <label for="p2">ክንውን</label>
                        <input type="number" id="p2" class="progress-input" min="0" max="100" value="00">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p2Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 3 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">ተግባር5.2.3~ 1 የሲስተም ማሻሻያ ስራ መስራት</span>
                    <div class="controls">
                        <label for="p3">ክንውን</label>
                        <input type="number" id="p3" class="progress-input" min="0" max="100" value="00">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p3Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

            <!-- Phase 4 -->
            <div class="roadmap-item">
                <div class="item-info">
                    <span class="item-title">ተግባር5.2.4~ የተተገበሩ ሲስተሞችን 100 % ማስተዳደር </span>
                    <div class="controls">
                        <label for="p4">ክንውን</label>
                        <input type="number" id="p4" class="progress-input" min="0" max="100" value="00">
                        <span>%</span>
                    </div>
                </div>
                <div class="progress-track">
                    <div id="p4Bar" class="progress-fill bg-blue"></div>
                </div>
            </div>

        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
